<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — IDS</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">IDS<span>Net</span></div>
        <h2>Create an account</h2>
        <p class="login-sub">Register to access the intrusion detection system.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form action="/register" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.85rem; color: #8a9bb5; text-align: center;">
            Already have an account? <a href="/login" style="color: #00d4ff;">Sign in</a>
        </p>
    </div>
</div>

</body>
</html>
