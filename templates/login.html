<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — IDS</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">IDS<span>Net</span></div>
        <h2>Welcome back</h2>
        <p class="login-sub">Sign in to access the intrusion detection system.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/login" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.85rem; color: #8a9bb5; text-align: center;">
    Don't have an account? <a href="/register" style="color: #00d4ff;">Register</a>
        </p>
    </div>
</div>

</body>
</html>
